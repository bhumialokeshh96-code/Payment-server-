<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #28a745; color: white; padding: 12px 20px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; width: 100%; }
        button:hover { background: #218838; }
        .error { color: red; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>Payment Form</h1>
    <form id="paymentForm">
        <div class="form-group">
            <label for="mobile">Mobile Number:</label>
            <input type="tel" id="mobile" name="mobile" placeholder="Enter 10-digit mobile number" required pattern="[0-9]{10}" maxlength="10">
            <div class="error" id="mobileError"></div>
        </div>
        
        <div class="form-group">
            <label for="amount">Select Amount:</label>
            <select id="amount" name="amount" required>
                <option value="">-- Select Amount --</option>
                <option value="600">₹600</option>
                <option value="1200">₹1200</option>
                <option value="1500">₹1500</option>
                <option value="2000">₹2000</option>
                <option value="3000">₹3000</option>
            </select>
            <div class="error" id="amountError"></div>
        </div>

        <button type="submit">Proceed to Pay</button>
    </form>

    <script>
        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous errors
            document.getElementById('mobileError').textContent = '';
            document.getElementById('amountError').textContent = '';

            const mobile = document.getElementById('mobile').value.trim();
            const amount = document.getElementById('amount').value;

            // Client-side validation
            let isValid = true;

            if (!mobile) {
                document.getElementById('mobileError').textContent = 'Mobile number is required';
                isValid = false;
            } else if (!/^[0-9]{10}$/.test(mobile)) {
                document.getElementById('mobileError').textContent = 'Enter valid 10-digit mobile number';
                isValid = false;
            }

            if (!amount) {
                document.getElementById('amountError').textContent = 'Please select an amount';
                isValid = false;
            }

            if (!isValid) return;

            // Disable button to prevent double submission
            const submitBtn = e.target.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        customer_phone: mobile,
                        order_amount: amount
                    })
                });

                const data = await response.json();

                if (data.success && data.payment_link) {
                    // Redirect to payment page
                    window.location.href = data.payment_link;
                } else {
                    alert(data.message || 'Something went wrong');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Proceed to Pay';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Network error. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Proceed to Pay';
            }
        });

        // Real-time mobile number validation
        document.getElementById('mobile').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, ''); // Only digits
            if (this.value.length > 10) {
                this.value = this.value.slice(0, 10);
            }
        });
    </script>
</body>
</html>
