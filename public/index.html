<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Gateway – Create Order</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>💳 Cashfree Payment Gateway</h1>
      <p class="subtitle">Secure payments powered by Cashfree</p>
    </header>

    <main>
      <section class="card" id="orderFormSection">
        <h2>Create Payment Order</h2>
        <form id="orderForm" novalidate>
          <div class="form-group">
            <label for="customerName">Full Name <span class="required">*</span></label>
            <input
              type="text"
              id="customerName"
              name="customerName"
              placeholder="John Doe"
              required
              maxlength="100"
              autocomplete="name"
            />
            <span class="error-msg" id="nameError"></span>
          </div>

          <div class="form-group">
            <label for="customerEmail">Email Address <span class="required">*</span></label>
            <input
              type="email"
              id="customerEmail"
              name="customerEmail"
              placeholder="john@example.com"
              required
              autocomplete="email"
            />
            <span class="error-msg" id="emailError"></span>
          </div>

          <div class="form-group">
            <label for="customerPhone">Phone Number <span class="required">*</span></label>
            <input
              type="tel"
              id="customerPhone"
              name="customerPhone"
              placeholder="+919876543210"
              required
              autocomplete="tel"
            />
            <span class="error-msg" id="phoneError"></span>
          </div>

          <div class="form-group">
            <label for="amount">Amount (INR) <span class="required">*</span></label>
            <div class="input-prefix-wrap">
              <span class="input-prefix">₹</span>
              <input
                type="number"
                id="amount"
                name="amount"
                placeholder="500"
                min="1"
                step="0.01"
                required
              />
            </div>
            <span class="error-msg" id="amountError"></span>
          </div>

          <div id="formError" class="alert alert-error hidden"></div>

          <button type="submit" id="submitBtn" class="btn btn-primary">
            <span id="btnText">Proceed to Pay</span>
            <span id="btnSpinner" class="spinner hidden"></span>
          </button>
        </form>
      </section>

      <section class="card hidden" id="statusSection">
        <h2>Payment Status</h2>
        <div id="statusContent" class="status-content"></div>
      </section>
    </main>

    <footer class="page-footer">
      <p>🔒 Your payment is secured by 256-bit SSL encryption</p>
    </footer>
  </div>

  <script src="/js/payment.js"></script>
</body>
</html>
