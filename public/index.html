<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Gateway – Quick Pay</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>💳 Quick Payment</h1>
      <p class="subtitle">Fast and secure payments</p>
    </header>

    <main>
      <section class="card" id="paymentFormSection">
        <h2>Make Payment</h2>
        <form id="paymentForm" novalidate>
          
          <div class="form-group">
            <label for="mobileNumber">Mobile Number <span class="required">*</span></label>
            <input
              type="tel"
              id="mobileNumber"
              name="mobileNumber"
              placeholder="Enter 10-digit number"
              required
              pattern="[0-9]{10}"
              maxlength="10"
              autocomplete="tel"
            />
            <span class="error-msg" id="mobileError"></span>
          </div>

          <div class="form-group">
            <label for="amount">Select Amount <span class="required">*</span></label>
            <div class="amount-buttons">
              <button type="button" class="amount-btn" data-amount="600">₹600</button>
              <button type="button" class="amount-btn" data-amount="1200">₹1200</button>
              <button type="button" class="amount-btn" data-amount="1600">₹1600</button>
              <button type="button" class="amount-btn" data-amount="2000">₹2000</button>
            </div>
            <input type="hidden" id="amount" name="amount" required />
            <span class="error-msg" id="amountError"></span>
          </div>

          <div id="formError" class="alert alert-error hidden"></div>

          <button type="submit" id="submitBtn" class="btn btn-primary">
            <span id="btnText">Proceed to Pay</span>
            <span id="btnSpinner" class="spinner hidden"></span>
          </button>
        </form>
      </section>

      <section class="card hidden" id="statusSection">
        <h2>Payment Status</h2>
        <div id="statusContent" class="status-content"></div>
      </section>
    </main>

    <footer class="page-footer">
      <p>🔒 Your payment is secured by 256-bit SSL encryption</p>
    </footer>
  </div>

  <script src="/js/payment.js"></script>
</body>
</html>
